services:
  - type: web
    name: conference-agent-api
    runtime: python
    pythonVersion: "3.11.11"
    buildCommand: pip install -e . && mkdir -p data
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: data/conference.db
      - key: CORS_ORIGINS
        value: '["https://conference-agent.streamlit.app"]'
      - key: DAILY_SCAN_ENABLED
        value: "true"
      - key: DAILY_SCAN_HOUR
        value: "9"
    plan: free
